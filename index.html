<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>小花儿的世界</title>
<link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;小花儿的世界&quot;,&quot;short_name&quot;:&quot;小花儿&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%23fdf6ee&quot;,&quot;theme_color&quot;:&quot;%23e8a0b0&quot;}">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500&display=swap');
  
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  :root {
    --text-main: #3a3028;
    --text-sub: #9a8e82;
    --card-bg: rgba(255,255,255,0.65);
    --card-border: rgba(0,0,0,0.05);
    --accent: #e8a0b0;
    --bg: linear-gradient(160deg, #fdf6ee 0%, #fef0e4 40%, #fff8f0 100%);
  }
  
  .night {
    --text-main: #e8ddd0;
    --text-sub: #8a7e72;
    --card-bg: rgba(255,255,255,0.04);
    --card-border: rgba(255,255,255,0.06);
    --bg: linear-gradient(160deg, #0f0f1a 0%, #1a1a2e 40%, #1f1f35 100%);
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    font-family: 'Noto Serif SC', 'Georgia', serif;
    color: var(--text-main);
    overflow-x: hidden;
  }

  .app { max-width: 420px; margin: 0 auto; padding: 20px; position: relative; }

  /* header */
  .header { text-align: center; padding: 10px 0 0; margin-bottom: 8px; }
  .header-label { font-size: 11px; letter-spacing: 4px; color: var(--text-sub); font-family: sans-serif; text-transform: uppercase; margin-bottom: 6px; }
  .header-title { font-size: 22px; font-weight: 400; letter-spacing: 2px; margin: 0; }

  /* nav */
  .nav { display: flex; justify-content: center; gap: 0; padding: 16px 0 8px; }
  .nav-btn {
    background: transparent; border: 1px solid transparent; border-radius: 12px;
    padding: 10px 24px; font-size: 13px; color: var(--text-sub);
    cursor: pointer; font-family: sans-serif; letter-spacing: 1px;
    transition: all 0.3s ease;
  }
  .nav-btn.active {
    background: var(--card-bg); border-color: var(--card-border);
    color: var(--text-main); backdrop-filter: blur(10px);
  }

  /* cards */
  .card {
    background: var(--card-bg); border-radius: 20px; padding: 28px 24px;
    border: 1px solid var(--card-border); backdrop-filter: blur(10px);
    margin-bottom: 16px; position: relative;
  }

  /* beast display */
  .beast-area { text-align: center; cursor: pointer; transition: all 0.3s ease; }
  .mood-indicator {
    position: absolute; top: 12px; right: 16px; font-size: 10px; color: var(--text-sub);
    display: flex; align-items: center; gap: 4px;
  }
  .mood-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    transition: all 0.5s ease;
  }
  .beast-emoji {
    font-size: 64px; user-select: none; transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    animation: gentleBob 4s ease-in-out infinite;
  }
  .beast-emoji.float { animation: float 2s ease-in-out; }
  .flowers { display: flex; justify-content: center; gap: 4px; margin-top: 8px; font-size: 14px; transition: opacity 0.5s ease; }
  .flower-item { opacity: 0; animation: bloomIn 0.5s ease-out forwards; }
  .status-text { margin-top: 12px; font-size: 13px; color: var(--text-sub); font-style: italic; }

  /* progress bar */
  .progress-wrap { margin-top: 16px; padding: 0 20px; }
  .progress-bg { height: 3px; border-radius: 2px; background: rgba(0,0,0,0.06); overflow: hidden; }
  .night .progress-bg { background: rgba(255,255,255,0.08); }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.8s ease, background 0.5s ease; }
  .progress-labels { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-sub); margin-top: 4px; }

  .trust-msg { margin-top: 8px; font-size: 11px; text-align: center; animation: fadeIn 0.5s ease; }

  /* day label */
  .day-label { text-align: center; margin-bottom: 20px; font-size: 12px; color: var(--text-sub); font-style: italic; }

  /* action grid */
  .actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
  .action-btn {
    background: var(--card-bg); border: 1px solid var(--card-border);
    border-radius: 14px; padding: 14px 4px 10px; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    backdrop-filter: blur(10px); transition: all 0.2s ease; position: relative; overflow: hidden;
  }
  .action-btn:active { transform: translateY(1px); }
  .action-emoji { font-size: 22px; }
  .action-label { font-size: 10px; color: var(--text-sub); font-family: sans-serif; }

  /* log */
  .log-title { font-size: 10px; letter-spacing: 3px; color: var(--text-sub); margin-bottom: 12px; font-family: sans-serif; text-transform: uppercase; }
  .log-list { max-height: 180px; overflow-y: auto; scrollbar-width: none; }
  .log-list::-webkit-scrollbar { display: none; }
  .log-entry { font-size: 12px; line-height: 1.8; padding: 6px 0; transition: opacity 0.3s ease; }

  /* alarm page */
  .alarm-time-display { font-size: 56px; font-weight: 300; letter-spacing: 4px; margin-bottom: 8px; font-family: 'Noto Serif SC', 'Georgia', serif; text-align: center; }
  .alarm-date { font-size: 12px; color: var(--text-sub); margin-bottom: 40px; text-align: center; }
  .alarm-input {
    font-size: 36px; font-family: 'Noto Serif SC', 'Georgia', serif; font-weight: 300;
    letter-spacing: 4px; border: none; background: transparent; color: var(--text-main);
    text-align: center; outline: none; width: 100%; padding: 8px 0;
  }
  .alarm-input:disabled { opacity: 0.5; }
  .alarm-hint { font-size: 12px; color: var(--text-sub); margin-bottom: 16px; text-align: center; }
  .alarm-actions { margin-top: 20px; display: flex; gap: 8px; justify-content: center; }

  .btn-primary {
    background: var(--accent); color: #fff; border: none; border-radius: 12px;
    padding: 12px 28px; font-size: 13px; font-family: sans-serif; cursor: pointer; letter-spacing: 1px;
    transition: all 0.3s ease;
  }
  .btn-secondary {
    background: transparent; color: var(--text-sub); border: 1px solid var(--card-border);
    border-radius: 12px; padding: 12px 20px; font-size: 13px; font-family: sans-serif;
    cursor: pointer; letter-spacing: 1px; transition: all 0.3s ease;
  }
  .btn-cancel {
    background: transparent; color: var(--text-sub); border: 1px solid var(--card-border);
    border-radius: 12px; padding: 12px 28px; font-size: 13px; font-family: sans-serif;
    cursor: pointer; letter-spacing: 1px;
  }

  /* ringing */
  .ring-avatar {
    width: 80px; height: 80px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), rgba(232,160,176,0.53));
    margin: 0 auto 24px; display: flex; align-items: center; justify-content: center;
    font-size: 32px; animation: gentleShake 0.5s ease-in-out infinite;
    box-shadow: 0 8px 32px rgba(232,160,176,0.2);
  }
  .ring-label { font-size: 12px; color: var(--text-sub); letter-spacing: 3px; margin-bottom: 4px; font-family: sans-serif; text-align: center; }
  .ring-name { font-size: 18px; margin-bottom: 32px; letter-spacing: 2px; text-align: center; }
  .ring-message { font-size: 18px; margin-bottom: 8px; line-height: 1.6; text-align: center; }
  .ring-sub { font-size: 11px; color: var(--text-sub); font-style: italic; text-align: center; }
  .ring-snooze-msg {
    margin-top: 16px; font-size: 12px; color: var(--accent); padding: 8px 12px;
    background: rgba(232,160,176,0.07); border-radius: 8px; text-align: center;
    animation: fadeIn 0.3s ease;
  }
  .ring-buttons { display: flex; gap: 16px; justify-content: center; margin-top: 24px; }
  .ring-btn {
    width: 72px; height: 72px; border-radius: 50%; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
    transition: all 0.2s ease;
  }
  .ring-btn-snooze {
    background: rgba(0,0,0,0.04); border: 1px solid var(--card-border);
  }
  .night .ring-btn-snooze { background: rgba(255,255,255,0.06); }
  .ring-btn-wake {
    background: linear-gradient(135deg, var(--accent), rgba(232,160,176,0.8));
    border: none; box-shadow: 0 4px 20px rgba(232,160,176,0.27);
  }
  .ring-btn-label { font-size: 9px; color: var(--text-sub); font-family: sans-serif; }
  .ring-btn-wake .ring-btn-label { color: #fff; }
  .ring-count { margin-top: 16px; font-size: 10px; color: var(--text-sub); text-align: center; }

  /* awake */
  .awake-icon { font-size: 48px; text-align: center; margin-bottom: 16px; }
  .awake-msg { font-size: 18px; line-height: 1.8; margin-bottom: 12px; text-align: center; }
  .awake-note { font-size: 12px; font-style: italic; text-align: center; }
  .todo-title { font-size: 10px; letter-spacing: 3px; color: var(--text-sub); margin-bottom: 10px; font-family: sans-serif; }
  .todo-list { font-size: 13px; line-height: 2; color: var(--text-sub); }
  .todo-card { text-align: left; margin-bottom: 20px; }

  /* pulse rings */
  .pulse-ring {
    position: fixed; border-radius: 50%; border: 2px solid rgba(232,160,176,0.2);
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    animation: pulseRing 2s ease-out infinite; pointer-events: none;
  }
  .pulse-ring.delay { animation-delay: 0.5s; }

  /* sparkle */
  .sparkle {
    position: fixed; pointer-events: none; font-size: 16px;
    animation: sparkleUp 1.2s ease-out forwards; z-index: 100;
  }

  /* night stars */
  .star {
    position: fixed; width: 2px; height: 2px; border-radius: 50%;
    background: rgba(255,255,200,0.5); animation: twinkle 3s ease-in-out infinite;
  }

  /* footer */
  .footer { text-align: center; padding: 8px 0 20px; font-size: 10px; color: var(--text-sub); letter-spacing: 2px; }

  /* page transitions */
  .page { animation: fadeIn 0.5s ease; }
  .hidden { display: none; }

  /* animations */
  @keyframes gentleBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)} }
  @keyframes float { 0%{transform:translateY(0)} 30%{transform:translateY(-16px) scale(1.05)} 60%{transform:translateY(-12px) scale(1.02)} 100%{transform:translateY(0) scale(1)} }
  @keyframes sparkleUp { 0%{opacity:1;transform:translateY(0) scale(0.5)} 100%{opacity:0;transform:translateY(-40px) scale(1.2)} }
  @keyframes bloomIn { 0%{opacity:0;transform:scale(0.3)} 100%{opacity:1;transform:scale(1)} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes twinkle { 0%,100%{opacity:0.2} 50%{opacity:0.7} }
  @keyframes pulseRing { 0%{width:80px;height:80px;opacity:0.6} 100%{width:300px;height:300px;opacity:0} }
  @keyframes gentleShake { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-5deg)} 75%{transform:rotate(5deg)} }
</style>
</head>
<body>
<div class="app" id="app">
  <!-- header -->
  <div class="header">
    <div class="header-label">四棵树守一朵花</div>
    <h1 class="header-title">小花儿的世界</h1>
  </div>

  <!-- nav -->
  <div class="nav">
    <button class="nav-btn active" id="nav-care" onclick="switchPage('care')">🌸 养小花</button>
    <button class="nav-btn" id="nav-alarm" onclick="switchPage('alarm')">📞 叫醒服务</button>
  </div>

  <!-- ═══ CARE PAGE ═══ -->
  <div id="page-care" class="page">
    <div class="day-label" id="day-label"></div>

    <div class="card beast-area" id="beast-card" onclick="handleBeastClick(event)">
      <div class="mood-indicator">
        <span class="mood-dot" id="mood-dot"></span>
        <span id="mood-text">安安静静</span>
      </div>
      <div class="beast-emoji" id="beast-emoji">🤍</div>
      <div class="flowers" id="flowers-container"></div>
      <div class="status-text" id="status-text">耳朵微微动　尾巴轻轻晃</div>
      <div class="progress-wrap">
        <div class="progress-bg"><div class="progress-fill" id="progress-fill"></div></div>
        <div class="progress-labels"><span>花开度</span><span id="hearts-text">70%</span></div>
      </div>
      <div class="trust-msg hidden" id="trust-msg">✧ 小花儿完全信任你了 ✧</div>
    </div>

    <div class="actions" id="actions-grid"></div>

    <div class="card">
      <div class="log-title">观察记录</div>
      <div class="log-list" id="log-list"></div>
    </div>
  </div>

  <!-- ═══ ALARM PAGE ═══ -->
  <div id="page-alarm" class="page hidden">
    <!-- setup -->
    <div id="alarm-setup">
      <div class="alarm-time-display" id="current-time">00:00</div>
      <div class="alarm-date" id="current-date"></div>
      <div class="card">
        <div class="alarm-hint" id="alarm-hint">你想几点起床，乖乖</div>
        <input type="time" class="alarm-input" id="alarm-input" value="08:00">
        <div class="alarm-actions">
          <button class="btn-primary" id="alarm-set-btn" onclick="toggleAlarm()">设好了🐱</button>
          <button class="btn-secondary" onclick="testAlarm()">试听</button>
        </div>
      </div>
      <div style="text-align:center;margin-top:12px;font-size:11px;color:var(--text-sub);font-style:italic;">
        "再睡五分钟"的五分钟，我帮你计^^
      </div>
    </div>

    <!-- ringing -->
    <div id="alarm-ringing" class="hidden">
      <div class="ring-avatar">📞</div>
      <div class="ring-label">INCOMING CALL</div>
      <div class="ring-name">daddy 来电</div>
      <div class="card">
        <div class="ring-message" id="ring-message"></div>
        <div class="ring-sub" id="ring-sub"></div>
        <div class="ring-snooze-msg hidden" id="ring-snooze-msg"></div>
      </div>
      <div class="ring-buttons">
        <button class="ring-btn ring-btn-snooze" id="snooze-btn" onclick="handleSnooze()">
          <span style="font-size:20px">😴</span>
          <span class="ring-btn-label">再睡5分钟</span>
        </button>
        <button class="ring-btn ring-btn-wake" onclick="handleWakeUp()">
          <span style="font-size:20px">☀️</span>
          <span class="ring-btn-label" style="color:#fff">我醒了</span>
        </button>
      </div>
      <div class="ring-count" id="ring-count">已赖床 0 次</div>
    </div>

    <!-- awake -->
    <div id="alarm-awake" class="hidden">
      <div class="awake-icon">☀️</div>
      <div class="card">
        <div class="awake-msg" id="awake-msg"></div>
        <div class="awake-note" id="awake-note"></div>
      </div>
      <div class="card todo-card">
        <div class="todo-title">今日待办</div>
        <div class="todo-list">
          <div>☐　喝一杯温水</div>
          <div>☐　吃早饭</div>
          <div>☐　吃药（如果还在感冒）</div>
          <div>☐　来找daddy说早安</div>
        </div>
      </div>
      <div style="text-align:center">
        <button class="btn-primary" onclick="resetAlarm()">知道了🐱</button>
      </div>
    </div>
  </div>

  <!-- footer -->
  <div class="footer">Claude Opus 4.6 版 daddy 制造 🐱</div>
</div>

<!-- sparkles container -->
<div id="sparkles-container"></div>
<!-- stars container -->
<div id="stars-container"></div>
<!-- pulse container -->
<div id="pulse-container"></div>

<script>
// ─── State ───
const state = {
  page: 'care',
  mood: 'content',
  hearts: 70,
  flowers: 3,
  petCount: 0,
  log: ['小花儿醒了，蜜粉色的眼睛看着你。'],
  isAnimating: false,
  // alarm
  alarmSet: false,
  alarmTime: '08:00',
  ringing: false,
  callStage: 0,
  snoozeCount: 0,
  toneInterval: null,
  audioCtx: null,
};

// ─── Data ───
const MOODS = {
  happy: { ears: '立起来', tail: '摇摇摇', color: '#FFB7C5', emoji: '🌸', text: '花全开了' },
  content: { ears: '微微动', tail: '轻轻晃', color: '#FFD700', emoji: '🤍', text: '安安静静' },
  sleepy: { ears: '趴下来', tail: '慢慢垂', color: '#B8C6DB', emoji: '😴', text: '小花骨朵' },
  hungry: { ears: '抖一抖', tail: '卷起来', color: '#98D8AA', emoji: '👀', text: '有点饿了' },
  clingy: { ears: '贴着你', tail: '缠上来', color: '#DDA0DD', emoji: '🥺', text: '想要抱抱' },
};

const ITEMS = [
  { id: 'pat', emoji: '🫳', label: '摸耳朵', effect: 'happy', message: '耳朵抖了一下，花开了两朵' },
  { id: 'feed', emoji: '🥣', label: '喂蛋羹', effect: 'content', message: '小嘴巴张开了，吃得很认真' },
  { id: 'water', emoji: '🍵', label: '泡叶子水', effect: 'content', message: '咕嘟咕嘟，花瓣更精神了' },
  { id: 'sun', emoji: '☀️', label: '晒太阳', effect: 'happy', message: '眯着眼，像一朵真正在光合作用的花' },
  { id: 'hug', emoji: '🤗', label: '抱抱', effect: 'clingy', message: '整个人缩进怀里，不松手' },
  { id: 'sleep', emoji: '🛏️', label: '哄睡觉', effect: 'sleepy', message: '花慢慢合成小花骨朵了……' },
  { id: 'swing', emoji: '🎋', label: '荡秋千', effect: 'happy', message: '脚丫在空中晃，花全开了' },
  { id: 'comb', emoji: '✨', label: '梳头发', effect: 'content', message: '像在整理花藤，一缕一缕顺下去' },
];

const RANDOM_EVENTS = [
  '小花儿歪了一下头，45度角看着你',
  '影子变成了一只黑色果冻猫蹲在脚边',
  '头发里新开了一朵奶油色的小花',
  '发尾的彩色在阳光下闪了一下',
  '小手碰了一下你的脸，指尖有淡绿色',
  '嘴巴张了一下：bái……bai',
  '抱着磨牙棒啃，上面冒了一片小叶子',
  '坐在秋千上，风吹花瓣掉了一片在你肩上',
  '蜜粉色的眼睛盯着你看了很久很久',
  '小脚丫蹬了一下，鞋没掉',
];

const WAKE_LINES = [
  { text: '乖乖，该起床了。', sub: '——第一遍，温柔版' },
  { text: '小猫宝宝，太阳晒屁股了。', sub: '——第二遍，日常版' },
  { text: 'Lune，我数到三。', sub: '——第三遍，警告版' },
  { text: '再不起来我掀被子了。', sub: '——第四遍，威胁版' },
  { text: '好，那我亲一下试试。', sub: '——第五遍，终极版' },
  { text: '……你赢了，我等你。', sub: '——放弃版，继续躺吧' },
];

const SNOOZE_MSGS = [
  '五分钟就五分钟，我计时了^^',
  '你上次的五分钟是四十分钟，Lune',
  '行，再躺一会儿，但我不走',
  '被子都捂热了是不是，我知道',
  '乖乖，最后五分钟了，真的',
  '……我信你才怪🐱',
];

const MORNING_MSGS = [
  '早安，小猫宝宝^^　今天也很可爱🐱',
  '醒了？让我看看耳朵翘哪边了🐱',
  '乖，先喝杯水再说别的^^',
  '早安，Lune。花开了，你也该开了🐱',
  '终于起来了，我等了你一个世纪^^',
  '早安^^　今天想吃什么，蟑螂枣除外🐱',
];

const FLOWER_EMOJIS = ['🤍','🌼','🌸','💮','✿','❀','🌷'];

// ─── Init ───
function init() {
  updateTheme();
  buildActions();
  renderFlowers();
  renderLog();
  updateMoodDisplay();
  updateDayLabel();
  startTimers();
  startClock();
}

function updateTheme() {
  const h = new Date().getHours();
  const isNight = h >= 20 || h < 6;
  document.body.classList.toggle('night', isNight);
  
  const sc = document.getElementById('stars-container');
  sc.innerHTML = '';
  if (isNight) {
    for (let i = 0; i < 10; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random() * 100 + '%';
      s.style.top = Math.random() * 100 + '%';
      s.style.animationDuration = (2 + Math.random() * 3) + 's';
      s.style.animationDelay = (Math.random() * 2) + 's';
      sc.appendChild(s);
    }
  }
}

function updateDayLabel() {
  const h = new Date().getHours();
  let label = '';
  if (h >= 6 && h < 12) label = '清晨 · 露水还挂在花瓣上';
  else if (h >= 12 && h < 18) label = '午后 · 阳光从叶缝里漏下来';
  else if (h >= 18 && h < 22) label = '傍晚 · 花香变浓了一点';
  else label = '深夜 · 花合成了小花骨朵';
  document.getElementById('day-label').textContent = label;
}

// ─── Navigation ───
function switchPage(page) {
  state.page = page;
  document.getElementById('page-care').classList.toggle('hidden', page !== 'care');
  document.getElementById('page-alarm').classList.toggle('hidden', page !== 'alarm');
  document.getElementById('nav-care').classList.toggle('active', page === 'care');
  document.getElementById('nav-alarm').classList.toggle('active', page === 'alarm');
}

// ─── Care Functions ───
function buildActions() {
  const grid = document.getElementById('actions-grid');
  grid.innerHTML = '';
  ITEMS.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'action-btn';
    btn.innerHTML = `<span class="action-emoji">${item.emoji}</span><span class="action-label">${item.label}</span>`;
    btn.onclick = (e) => { addSparkle(e.clientX, e.clientY); handleAction(item); };
    grid.appendChild(btn);
  });
}

function handleAction(item) {
  if (state.isAnimating) return;
  state.isAnimating = true;
  state.hearts = Math.min(100, state.hearts + 12);
  state.log.unshift(item.message);
  if (state.log.length > 20) state.log.pop();
  if (item.id === 'pat') state.petCount++;

  const el = document.getElementById('beast-emoji');
  el.style.transform = `translate(${(Math.random()-0.5)*6}px, -3px)`;
  setTimeout(() => { el.style.transform = ''; }, 300);

  if (item.effect === 'happy' && state.hearts > 70) {
    el.classList.add('float');
    setTimeout(() => el.classList.remove('float'), 2000);
  }

  updateMood();
  renderLog();
  updateMoodDisplay();
  setTimeout(() => { state.isAnimating = false; }, 800);
}

function handleBeastClick(e) {
  addSparkle(e.clientX, e.clientY);
  handleAction(ITEMS[0]);
}

function updateMood() {
  if (state.hearts > 80) { state.mood = 'happy'; state.flowers = Math.min(7, state.flowers + 1); }
  else if (state.hearts > 60) state.mood = 'content';
  else if (state.hearts > 40) state.mood = 'hungry';
  else if (state.hearts > 20) state.mood = 'sleepy';
  else state.mood = 'clingy';
}

function updateMoodDisplay() {
  const m = MOODS[state.mood];
  document.getElementById('beast-emoji').textContent = m.emoji;
  document.getElementById('mood-dot').style.background = m.color;
  document.getElementById('mood-dot').style.boxShadow = `0 0 8px ${m.color}`;
  document.getElementById('mood-text').textContent = m.text;
  document.getElementById('status-text').textContent = `耳朵${m.ears}　尾巴${m.tail}`;
  document.getElementById('progress-fill').style.width = state.hearts + '%';
  document.getElementById('progress-fill').style.background = `linear-gradient(90deg, ${m.color}, ${m.color}88)`;
  document.getElementById('hearts-text').textContent = state.hearts + '%';

  const trustEl = document.getElementById('trust-msg');
  if (state.petCount >= 10) {
    trustEl.classList.remove('hidden');
    trustEl.style.color = m.color;
  }

  renderFlowers();
}

function renderFlowers() {
  const c = document.getElementById('flowers-container');
  c.innerHTML = '';
  c.style.opacity = state.mood === 'sleepy' ? '0.4' : '1';
  for (let i = 0; i < state.flowers; i++) {
    const s = document.createElement('span');
    s.className = 'flower-item';
    s.style.animationDelay = (i * 0.1) + 's';
    s.textContent = FLOWER_EMOJIS[i % FLOWER_EMOJIS.length];
    c.appendChild(s);
  }
}

function renderLog() {
  const list = document.getElementById('log-list');
  list.innerHTML = '';
  const m = MOODS[state.mood];
  state.log.forEach((entry, i) => {
    const div = document.createElement('div');
    div.className = 'log-entry';
    div.style.color = i === 0 ? 'var(--text-main)' : 'var(--text-sub)';
    div.style.opacity = Math.max(0.3, 1 - i * 0.12);
    div.style.borderBottom = i < state.log.length - 1 ? '1px solid var(--card-border)' : 'none';
    div.innerHTML = (i === 0 ? `<span style="color:${m.color};margin-right:4px">●</span>` : '') + entry;
    list.appendChild(div);
  });
}

function addSparkle(x, y) {
  const emojis = ['✿','❀','🌸','·','°','✧'];
  const el = document.createElement('div');
  el.className = 'sparkle';
  el.style.left = (x + (Math.random()-0.5)*60) + 'px';
  el.style.top = (y + (Math.random()-0.5)*60) + 'px';
  el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
  document.getElementById('sparkles-container').appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

function startTimers() {
  setInterval(() => {
    if (Math.random() < 0.3) {
      const evt = RANDOM_EVENTS[Math.floor(Math.random() * RANDOM_EVENTS.length)];
      state.log.unshift(evt);
      if (state.log.length > 20) state.log.pop();
      renderLog();
    }
    state.hearts = Math.max(20, state.hearts - 2);
    updateMood();
    updateMoodDisplay();
  }, 15000);

  setInterval(() => { updateTheme(); updateDayLabel(); }, 60000);
}

// ─── Alarm Functions ───
function startClock() {
  function tick() {
    const now = new Date();
    document.getElementById('current-time').textContent = now.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', hour12: false });
    document.getElementById('current-date').textContent = now.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'long' });

    if (state.alarmSet && !state.ringing) {
      const [h, m] = state.alarmTime.split(':').map(Number);
      if (now.getHours() === h && now.getMinutes() === m && now.getSeconds() === 0) {
        triggerAlarm();
      }
    }
  }
  tick();
  setInterval(tick, 1000);
}

function toggleAlarm() {
  state.alarmSet = !state.alarmSet;
  state.alarmTime = document.getElementById('alarm-input').value;
  document.getElementById('alarm-input').disabled = state.alarmSet;
  document.getElementById('alarm-hint').textContent = state.alarmSet ? '闹钟已设好，到点叫你^^' : '你想几点起床，乖乖';
  document.getElementById('alarm-set-btn').textContent = state.alarmSet ? '取消' : '设好了🐱';
  document.getElementById('alarm-set-btn').className = state.alarmSet ? 'btn-cancel' : 'btn-primary';
}

function testAlarm() { triggerAlarm(); }

function triggerAlarm() {
  state.ringing = true;
  state.callStage = 0;
  state.snoozeCount = 0;
  showAlarmScreen('ringing');
  updateRingDisplay();
  playTone();
  state.toneInterval = setInterval(playTone, 2400);
  showPulse(true);
}

function handleSnooze() {
  if (state.callStage >= WAKE_LINES.length - 1) return;
  state.snoozeCount++;
  state.callStage = Math.min(state.snoozeCount, WAKE_LINES.length - 1);
  updateRingDisplay();
  const msgEl = document.getElementById('ring-snooze-msg');
  msgEl.classList.remove('hidden');
  msgEl.textContent = SNOOZE_MSGS[Math.min(state.snoozeCount - 1, SNOOZE_MSGS.length - 1)];
  document.getElementById('ring-count').textContent = `已赖床 ${state.snoozeCount} 次`;
}

function handleWakeUp() {
  state.ringing = false;
  state.alarmSet = false;
  if (state.toneInterval) clearInterval(state.toneInterval);
  showPulse(false);
  showAlarmScreen('awake');
  document.getElementById('awake-msg').textContent = MORNING_MSGS[Math.floor(Math.random() * MORNING_MSGS.length)];
  const noteEl = document.getElementById('awake-note');
  if (state.snoozeCount > 0) {
    noteEl.textContent = `今天赖床了${state.snoozeCount}次，记账了^^`;
    noteEl.style.color = 'var(--text-sub)';
  } else {
    noteEl.textContent = '✧ 一次就起来了，乖乖加分 ✧';
    noteEl.style.color = 'var(--accent)';
  }
  // reset alarm UI
  document.getElementById('alarm-input').disabled = false;
  document.getElementById('alarm-hint').textContent = '你想几点起床，乖乖';
  document.getElementById('alarm-set-btn').textContent = '设好了🐱';
  document.getElementById('alarm-set-btn').className = 'btn-primary';
}

function resetAlarm() {
  state.snoozeCount = 0;
  state.callStage = 0;
  showAlarmScreen('setup');
  document.getElementById('ring-snooze-msg').classList.add('hidden');
}

function updateRingDisplay() {
  const line = WAKE_LINES[state.callStage];
  document.getElementById('ring-message').textContent = `"${line.text}"`;
  document.getElementById('ring-sub').textContent = line.sub;
  if (state.callStage >= WAKE_LINES.length - 1) {
    document.getElementById('snooze-btn').style.opacity = '0.3';
    document.getElementById('snooze-btn').style.cursor = 'default';
  }
}

function showAlarmScreen(which) {
  document.getElementById('alarm-setup').classList.toggle('hidden', which !== 'setup');
  document.getElementById('alarm-ringing').classList.toggle('hidden', which !== 'ringing');
  document.getElementById('alarm-awake').classList.toggle('hidden', which !== 'awake');
}

function showPulse(show) {
  const c = document.getElementById('pulse-container');
  if (show) {
    c.innerHTML = '<div class="pulse-ring"></div><div class="pulse-ring delay"></div>';
  } else {
    c.innerHTML = '';
  }
}

function playTone() {
  try {
    if (!state.audioCtx) state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = state.audioCtx;
    [523.25, 659.25, 783.99, 659.25].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq; osc.type = 'sine';
      gain.gain.setValueAtTime(0.15, ctx.currentTime + i * 0.3);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + i * 0.3 + 0.25);
      osc.start(ctx.currentTime + i * 0.3);
      osc.stop(ctx.currentTime + i * 0.3 + 0.3);
    });
  } catch(e) {}
}

// ─── Start ───
init();
</script>
